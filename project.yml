# XcodeGen project definition.
# Generates Spindle999.xcodeproj from this file, so the project can be built
# on a macOS CI runner without ever opening Xcode by hand on a Mac.
#
#   brew install xcodegen && xcodegen generate
#
# Info.plist is GENERATED by Xcode (GENERATE_INFOPLIST_FILE=YES) and every
# key is supplied as an INFOPLIST_KEY_* build setting — no hand-written
# plist file, which avoids the path/duplication conflicts that broke the
# first builds.
name: Spindle999
options:
  bundleIdPrefix: com.aler14
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    # Sideload-friendly: CI builds unsigned, AltStore/SideStore signs later.
    CODE_SIGNING_ALLOWED: "NO"
    CODE_SIGNING_REQUIRED: "NO"

targets:
  Spindle999:
    type: application
    platform: iOS
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aler14.spindle999
        TARGETED_DEVICE_FAMILY: "1"          # iPhone only for now
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: Spindle999
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Per importare immagini e audio dalla tua galleria."
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: "Per salvare i video creati nella galleria."
