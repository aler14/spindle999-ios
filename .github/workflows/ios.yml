name: Build iOS (unsigned IPA)

# Builds an UNSIGNED .ipa on a macOS runner and uploads it as an artifact.
# You download that .ipa and let AltStore / SideStore sign it with your free
# Apple ID and install it on the iPhone — no Mac and no paid account needed.

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # lets you trigger a build manually from the Actions tab

jobs:
  build:
    # macos-15 ships Xcode 16, which matches the project file format (77)
    # that the current XcodeGen emits. (macos-14 + Xcode 15.4 failed to read it.)
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: List targets/schemes (diagnostic)
        run: xcodebuild -list -project Spindle999.xcodeproj

      - name: Build (unsigned)
        run: |
          set -eo pipefail
          # XcodeGen DOES emit a shared "Spindle999" scheme (confirmed by
          # -list); -scheme is required when -derivedDataPath is used.
          xcodebuild \
            -project Spindle999.xcodeproj \
            -scheme Spindle999 \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" DEVELOPMENT_TEAM="" \
            clean build

      - name: Package .ipa
        run: |
          set -eo pipefail
          APP_PATH="build/Build/Products/Release-iphoneos/Spindle999.app"
          if [ ! -d "$APP_PATH" ]; then echo "App non trovata in $APP_PATH"; exit 1; fi
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -qry Spindle999.ipa Payload
          echo "IPA creato: $(du -h Spindle999.ipa | cut -f1)"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Spindle999-ipa
          path: Spindle999.ipa
          if-no-files-found: error
